services:
  # Loki: Log aggregation engine
  loki:
    image: grafana/loki:3.7.3
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro,Z
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - loki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/loki/api/v1/status/buildinfo"]
      interval: 10s
      timeout: 5s
      retries: 5

  ## Grafana alloy: Ingestion service
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    command:
      - run
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro,Z
      - ./logs:/logs:ro,Z
    #depends_on:
    #  - loki
    restart: unless-stopped

  ## Grafana: Visualization and dashboarding UI
  grafana:
    image: grafana/grafana:12.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123  # Change this!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro,Z
      # - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      # - .grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro,Z
    # depends_on:
    #   - loki
    networks:
      - loki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  loki-data:
    driver: local
  grafana-data:
    driver: local

networks:
  loki-network:
    driver: bridge
