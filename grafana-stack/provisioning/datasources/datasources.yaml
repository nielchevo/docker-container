apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: 'trace_id[=:]\s?(\w+)'
          url: 'http://localhost:16686/search?q=$${__value.raw}'
          datasourceUid: jaeger
          optional: true