services:
  postgresql:
    container_name: db_postgresql
    build:
      context: .
      dockerfile: postgis.Dockerfile
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      # Do NOT set PGDATA — let PG18 use its default (/var/lib/postgresql/18/docker)
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d/,Z
      - postgres_data:/var/lib/postgresql,Z # mount the parent; PG18 manages the subdir
    networks:
      - db_network

networks:
  db_network:
    external: true

volumes:
  postgres_data:
    driver: local
